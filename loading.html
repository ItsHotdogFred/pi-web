<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Pi</title>
		<link rel="stylesheet" href="skeleton-dashboard.css" />
	</head>
	<body class="dashboard-skeleton" aria-busy="true" aria-live="polite">
		<div class="app">
			<aside class="sidebar" aria-hidden="true">
				<div class="sidebar-top">
					<div class="skeleton-block skeleton-icon-btn"></div>
				</div>
				<nav class="sidebar-nav">
					<div class="skeleton-block skeleton-nav-item"></div>
				</nav>
				<section class="sidebar-section">
					<div class="skeleton-block skeleton-section-title"></div>
					<div class="skeleton-block skeleton-today-item"></div>
					<div class="skeleton-block skeleton-today-item"></div>
					<div class="skeleton-block skeleton-today-item"></div>
				</section>
			</aside>

			<main class="main">
				<div class="view view-dashboard">
					<header class="page-header">
						<div class="context-chips">
							<div class="skeleton-block skeleton-chip"></div>
							<div class="skeleton-block skeleton-chip skeleton-chip--short"></div>
						</div>
						<div class="connection-status status-connecting">
							<span class="status-dot" aria-hidden="true"></span>
							<span id="status">Starting server…</span>
						</div>
					</header>

					<div class="dashboard-body">
						<div class="skeleton-composer">
							<div class="skeleton-block skeleton-composer-input"></div>
							<div class="skeleton-composer-bar">
								<div class="skeleton-block skeleton-pill"></div>
								<div class="skeleton-composer-actions">
									<div class="skeleton-block skeleton-icon-btn"></div>
									<div class="skeleton-block skeleton-send-btn"></div>
								</div>
							</div>
						</div>

						<div class="skeleton-block skeleton-commands-hint"></div>

						<div class="skeleton-contrib">
							<div class="skeleton-block skeleton-contrib-title"></div>
							<div class="skeleton-contrib-grid" aria-hidden="true"></div>
						</div>

						<div class="skeleton-activity" aria-hidden="true">
							<div class="skeleton-activity-card">
								<div class="skeleton-block skeleton-activity-art"></div>
								<div class="skeleton-activity-body">
									<div class="skeleton-block skeleton-activity-line skeleton-activity-line--title"></div>
									<div class="skeleton-block skeleton-activity-line skeleton-activity-line--meta"></div>
								</div>
							</div>
							<div class="skeleton-activity-card">
								<div class="skeleton-block skeleton-activity-art"></div>
								<div class="skeleton-activity-body">
									<div class="skeleton-block skeleton-activity-line skeleton-activity-line--title"></div>
									<div class="skeleton-block skeleton-activity-line skeleton-activity-line--meta"></div>
								</div>
							</div>
							<div class="skeleton-activity-card">
								<div class="skeleton-block skeleton-activity-art"></div>
								<div class="skeleton-activity-body">
									<div class="skeleton-block skeleton-activity-line skeleton-activity-line--title"></div>
									<div class="skeleton-block skeleton-activity-line skeleton-activity-line--meta"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</main>
		</div>
		<script>
			const params = new URLSearchParams(window.location.search);
			const port = Number(params.get("port") || 3847);
			const host = params.get("host") || "127.0.0.1";
			const healthUrl = `http://${host}:${port}/health`;
			const appUrl = `http://${host}:${port}/`;
			const statusEl = document.getElementById("status");
			const gridEl = document.querySelector(".skeleton-contrib-grid");
			const started = Date.now();

			for (let week = 0; week < 26; week += 1) {
				const column = document.createElement("div");
				column.className = "skeleton-contrib-week";
				for (let day = 0; day < 7; day += 1) {
					const cell = document.createElement("div");
					cell.className = "skeleton-block skeleton-contrib-cell";
					column.appendChild(cell);
				}
				gridEl.appendChild(column);
			}

			function setStatus(text) {
				statusEl.textContent = text;
			}

			async function waitForServer() {
				while (true) {
					try {
						const res = await fetch(healthUrl, { cache: "no-store" });
						if (res.ok) {
							setStatus("Opening Pi…");
							window.location.replace(appUrl);
							return;
						}
					} catch {
						// server not ready yet
					}

					if (Date.now() - started > 60_000) {
						setStatus("Server is taking longer than expected. Still trying…");
					}

					await new Promise((resolve) => setTimeout(resolve, 100));
				}
			}

			void waitForServer();
		</script>
	</body>
</html>
