<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Pi</title>
		<script>
			(function () {
				var KEY = "pi-web-theme";
				var modes = ["system", "dark", "light"];
				var mode = "system";
				try {
					var stored = localStorage.getItem(KEY);
					if (stored && modes.indexOf(stored) >= 0) mode = stored;
				} catch (_) {}
				var resolved =
					mode === "system"
						? window.matchMedia("(prefers-color-scheme: dark)").matches
							? "dark"
							: "light"
						: mode;
				document.documentElement.dataset.themeMode = mode;
				document.documentElement.dataset.theme = resolved;
			})();
		</script>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/skeleton-dashboard.css" />
		<style>
			#startup-splash {
				position: fixed;
				inset: 0;
				z-index: 10000;
				transition: opacity 0.35s ease, visibility 0.35s ease;
			}

			#startup-splash.startup-splash--hidden {
				opacity: 0;
				visibility: hidden;
				pointer-events: none;
			}

			.app--booting {
				visibility: hidden;
			}
		</style>
	</head>
	<body>
		<div id="startup-splash" class="dashboard-skeleton" aria-live="polite" aria-busy="true"></div>
		<div class="app app--booting">
			<aside class="sidebar" id="sidebar">
				<div class="sidebar-top">
					<button type="button" class="icon-btn" id="search-btn" aria-label="Search">
						<span data-hi="magnifier" data-hi-size="16"></span>
					</button>
				</div>

				<div class="sidebar-search hidden" id="sidebar-search">
					<input type="search" id="search-input" placeholder="Search agents & conversations…" autocomplete="off" />
				</div>

				<nav class="sidebar-nav" aria-label="Main navigation">
					<button type="button" class="nav-item active" data-view="dashboard" id="nav-dashboard">
						<span data-hi="layout-dashboard" data-hi-size="16"></span>
						Dashboard
					</button>
				</nav>

				<section class="sidebar-section">
					<div class="today-list" id="today-list" aria-label="Recent agents"></div>
				</section>
			</aside>

			<main class="main">
				<!-- Dashboard / New Agent view -->
				<div class="view view-dashboard" id="dashboard-view">
					<header class="page-header">
						<div class="context-chips" aria-label="Project context">
							<div class="dropdown" id="project-dropdown">
								<button type="button" class="context-chip context-chip-button dropdown-trigger" id="project-trigger" aria-haspopup="listbox" title="Switch project">
									<span id="project-name">pi-web</span>
									<span data-hi="down-chevron" data-hi-size="10"></span>
								</button>
								<div class="dropdown-menu project-menu hidden" id="project-menu" role="listbox">
									<div class="project-menu-section">
										<span class="project-menu-label">Recent</span>
										<div class="project-menu-list" id="project-menu-list"></div>
									</div>
									<form class="project-menu-form" id="project-path-form">
										<label class="project-menu-label" for="project-path-input">Open folder</label>
										<div class="project-menu-input-row">
											<input
												type="text"
												id="project-path-input"
												placeholder="/absolute/path/to/project"
												autocomplete="off"
												spellcheck="false"
											/>
											<button type="submit" class="project-menu-open">Open</button>
										</div>
										<p class="project-menu-error hidden" id="project-path-error" role="alert"></p>
									</form>
								</div>
							</div>
							<span class="context-chip context-chip-branch">
								<span data-hi="code" data-hi-size="14"></span>
								<span id="branch-name">master</span>
							</span>
						</div>
						<div class="connection-status status-connecting" id="status">
							<span class="status-dot" aria-hidden="true"></span>
							<span class="status-label">Connecting…</span>
						</div>
					</header>

					<div class="dashboard-composer-section">
						<div id="dashboard-inline-pickers"></div>

						<div class="dashboard-buddy-zone">
							<div class="pi-buddy" id="pi-buddy">
								<p class="pi-buddy-speech hidden" id="pi-buddy-speech" role="status" aria-live="polite"></p>
								<button type="button" class="pi-buddy-btn" id="pi-buddy-btn" aria-label="Pi buddy — click for advice">
									<canvas id="pi-buddy-canvas" width="60" height="36" aria-hidden="true"></canvas>
								</button>
							</div>
							<div id="dashboard-composer-mount"></div>
						</div>

						<button type="button" class="commands-hint" id="commands-hint">
							<span data-hi="pen" data-hi-size="13"></span>
							Try Commands <kbd>/</kbd>
						</button>
					</div>

					<div class="dashboard-body">

						<section class="contrib-graph" id="contrib-graph" aria-label="Prompt activity">
							<div class="contrib-graph-header">
								<span class="contrib-graph-count" id="contrib-graph-count"></span>
							</div>
							<div class="contrib-graph-body">
								<div class="contrib-graph-months" id="contrib-graph-months" aria-hidden="true"></div>
								<div class="contrib-graph-grid-wrap">
									<div class="contrib-graph-days" aria-hidden="true">
										<span></span>
										<span>Mon</span>
										<span></span>
										<span>Wed</span>
										<span></span>
										<span>Fri</span>
										<span></span>
									</div>
									<div class="contrib-graph-weeks" id="contrib-graph-weeks"></div>
								</div>
							</div>
							<div class="contrib-graph-footer">
								<button type="button" class="contrib-graph-learn" id="contrib-graph-learn">
									<span data-hi="info-circle" data-hi-size="12"></span>
									Learn how we count prompts
								</button>
								<div class="contrib-graph-legend" aria-hidden="true">
									<span>Less</span>
									<span class="contrib-cell level-0"></span>
									<span class="contrib-cell level-1"></span>
									<span class="contrib-cell level-2"></span>
									<span class="contrib-cell level-3"></span>
									<span class="contrib-cell level-4"></span>
									<span>More</span>
								</div>
							</div>
							<p class="contrib-graph-note hidden" id="contrib-graph-note">
								Each square is one day. We count user prompts sent to Pi in this project, read from your local session history on this machine — nothing is sent elsewhere.
							</p>
						</section>

						<div class="activity-feed" id="activity-feed" aria-label="Recent activity"></div>
					</div>
				</div>

				<!-- Agent chat view -->
				<div class="view view-chat hidden" id="chat-view">
					<header class="chat-header">
						<button type="button" class="back-btn" id="back-to-dashboard" aria-label="Back to dashboard">
							<span data-hi="arrow-back" data-hi-size="16"></span>
						</button>
						<h1 class="chat-title" id="chat-title">New Agent</h1>
						<div class="connection-status status-connecting" id="chat-status">
							<span class="status-dot" aria-hidden="true"></span>
							<span class="status-label">Connecting…</span>
						</div>
					</header>

					<div class="chat-body">
						<div class="chat-main">
							<div class="chat-area" id="chat-area">
								<div class="messages" id="messages" aria-live="polite"></div>
							</div>

							<div class="chat-composer-wrap">
						<div class="todo-panel hidden" id="todo-panel" aria-label="Agent todos">
							<div class="todo-panel-header">
								<span class="todo-panel-icon" id="todo-panel-icon" aria-hidden="true"></span>
								<span class="todo-panel-title" id="todo-panel-title">Todos</span>
								<span class="todo-panel-count" id="todo-panel-count"></span>
							</div>
							<ul class="todo-list" id="todo-list"></ul>
							<div class="todo-panel-more hidden" id="todo-panel-more"></div>
						</div>

						<div class="file-context hidden" id="file-context">
							<button type="button" class="file-context-header" id="file-context-toggle" aria-expanded="true">
								<span class="file-context-chevron" data-hi="down-chevron" data-hi-size="12"></span>
								<span id="file-context-count">0 Files Touched</span>
							</button>
							<div class="file-context-body" id="file-context-body">
								<ul class="file-context-list" id="file-context-list"></ul>
							</div>
						</div>

						<div id="chat-inline-pickers"></div>

						<div id="chat-composer-mount"></div>
							</div>
						</div>

						<aside class="prompt-history" id="prompt-history" aria-label="Prompt history">
							<div class="prompt-history-header">
								<h2 class="prompt-history-title"><span data-hi="history-circle" data-hi-size="14"></span> History</h2>
							</div>
							<nav class="prompt-history-list" id="prompt-history-list"></nav>
						</aside>
					</div>
				</div>
			</main>
		</div>

		<input type="file" id="file-input" accept="image/*" class="hidden" />

		<div id="modals-mount"></div>

		<template id="modal-shell-template">
			<div class="permission-modal hidden" aria-hidden="true">
				<div class="permission-backdrop"></div>
				<div class="permission-dialog" role="dialog" aria-modal="true"></div>
			</div>
		</template>

		<template id="inline-picker-template">
			<div class="inline-commands" aria-hidden="true">
				<ul class="inline-commands-list"></ul>
			</div>
		</template>

		<template id="composer-form-template">
			<form class="composer-box">
				<div class="composer-input-wrap">
					<div class="composer-input-highlight" aria-hidden="true"></div>
					<textarea rows="2" autocomplete="off" spellcheck="false"></textarea>
				</div>
				<div class="attachment-previews hidden" aria-label="Attached images"></div>
				<div class="composer-bar">
					<div class="composer-left"></div>
					<div class="composer-right">
						<button type="button" class="icon-btn composer-icon" data-composer-icon="fileRef" aria-label="Reference file or folder"></button>
						<button type="button" class="icon-btn composer-icon" data-composer-icon="attach" aria-label="Attach image"></button>
					</div>
				</div>
			</form>
		</template>

		<template id="model-dropdown-template">
			<div class="dropdown composer-dropdown">
				<button type="button" class="pill-btn dropdown-trigger">
					<span>Model</span>
					<span data-hi="down-chevron" data-hi-size="10"></span>
				</button>
				<div class="dropdown-menu model-menu hidden">
					<div class="model-menu-search-wrap">
						<input type="search" placeholder="Search models…" autocomplete="off" spellcheck="false" />
					</div>
					<div class="model-menu-list"></div>
				</div>
			</div>
		</template>

		<template id="context-dial-template">
			<div class="context-dial-wrap hidden">
				<button type="button" class="context-dial" aria-expanded="false" aria-controls="context-popover">
					<svg class="context-dial-svg" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
						<circle class="context-dial-track" cx="9" cy="9" r="7" />
						<circle class="context-dial-fill" cx="9" cy="9" r="7" />
					</svg>
					<span class="context-dial-label">—</span>
				</button>
				<div class="context-popover hidden" role="tooltip">
					<div class="context-popover-header">
						<span class="context-popover-title">Context</span>
						<span class="context-popover-summary">— / —</span>
					</div>
					<ul class="context-breakdown"></ul>
					<div class="context-actions hidden">
						<button type="button" class="context-action-btn">Compact now</button>
						<button type="button" class="context-action-btn context-action-btn--secondary">Start fresh session</button>
					</div>
					<p class="context-popover-note">Without SYSTEM.md, Pi uses its bundled default prompt (dist/core/system-prompt.js). APPEND_SYSTEM.md extends that base. Skills and MCP tool schemas add separately.</p>
				</div>
			</div>
		</template>

		<script src="/marked.min.js"></script>
		<script src="/mermaid.min.js"></script>
		<script type="module" src="/app.js"></script>
	</body>
</html>
