<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Pi</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div class="app">
			<aside class="sidebar" id="sidebar">
				<div class="sidebar-top">
					<button type="button" class="icon-btn" id="sidebar-toggle" aria-label="Toggle sidebar">
						<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
							<rect x="2" y="2" width="5" height="12" rx="1" stroke="currentColor" stroke-width="1.25" />
							<path d="M10 4.5h4M10 8h4M10 11.5h4" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
						</svg>
					</button>
					<button type="button" class="icon-btn" id="search-btn" aria-label="Search">
						<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
							<circle cx="7" cy="7" r="4.25" stroke="currentColor" stroke-width="1.25" />
							<path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
						</svg>
					</button>
				</div>

				<div class="sidebar-search hidden" id="sidebar-search">
					<input type="search" id="search-input" placeholder="Search agents…" autocomplete="off" />
				</div>

				<nav class="sidebar-nav" aria-label="Main navigation">
					<button type="button" class="nav-item active" data-view="new-agent" id="nav-new-agent">
						<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
							<path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
						</svg>
						New Agent
					</button>
					<button type="button" class="nav-item" data-view="dashboard" id="nav-dashboard">
						<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
							<rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.25" />
							<rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.25" />
							<rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.25" />
							<rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.25" />
						</svg>
						Dashboard
					</button>
				</nav>

				<section class="sidebar-section">
					<h2 class="sidebar-section-title">Today</h2>
					<div class="today-list" id="today-list" aria-label="Recent agents"></div>
				</section>
			</aside>

			<main class="main">
				<!-- Dashboard / New Agent view -->
				<div class="view view-dashboard" id="dashboard-view">
					<header class="page-header">
						<div class="selectors">
							<div class="dropdown" id="project-dropdown">
								<button type="button" class="dropdown-trigger" id="project-trigger" aria-haspopup="listbox">
									<span id="project-name">pi-web</span>
									<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
										<path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
									</svg>
								</button>
								<div class="dropdown-menu hidden" id="project-menu" role="listbox"></div>
							</div>
							<div class="dropdown" id="branch-dropdown">
								<button type="button" class="dropdown-trigger" id="branch-trigger" aria-haspopup="listbox">
									<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
										<circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="1.1" />
										<circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.1" />
										<path d="M4 6v2.5a1.5 1.5 0 001.5 1.5H8" stroke="currentColor" stroke-width="1.1" />
									</svg>
									<span id="branch-name">master</span>
									<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
										<path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
									</svg>
								</button>
								<div class="dropdown-menu hidden" id="branch-menu" role="listbox"></div>
							</div>
						</div>
						<div class="connection-status status-connecting" id="status">
							<span class="status-dot" aria-hidden="true"></span>
							<span class="status-label">Connecting…</span>
						</div>
					</header>

					<div class="dashboard-body">
						<form class="composer-box" id="composer">
							<textarea
								id="input"
								rows="3"
								placeholder="Ask Cursor to build, fix bugs, explore"
								autocomplete="off"
								spellcheck="true"
							></textarea>
							<div class="composer-bar">
								<div class="composer-left">
									<div class="dropdown composer-dropdown" id="model-dropdown">
										<button type="button" class="pill-btn dropdown-trigger" id="model-trigger">
											<span id="model-label">Composer 2.5</span>
											<svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
												<path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
											</svg>
										</button>
										<div class="dropdown-menu hidden" id="model-menu"></div>
									</div>
									<div class="dropdown composer-dropdown" id="mcps-dropdown">
										<button type="button" class="pill-btn dropdown-trigger" id="mcps-trigger">
											<span>MCPs</span>
											<svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
												<path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
											</svg>
										</button>
										<div class="dropdown-menu hidden" id="mcps-menu"></div>
									</div>
								</div>
								<div class="composer-right">
									<button type="button" class="icon-btn composer-icon" id="attach-btn" aria-label="Attach image">
										<svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
											<rect x="2" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.25" />
											<circle cx="6.5" cy="7.5" r="1.5" stroke="currentColor" stroke-width="1.1" />
											<path d="M2 12l4-3.5 3 2.5 3-2.5 4 3.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" />
										</svg>
									</button>
									<button type="button" class="icon-btn composer-icon mic-btn" id="mic-btn" aria-label="Voice input">
										<svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
											<rect x="6.5" y="2" width="5" height="9" rx="2.5" stroke="currentColor" stroke-width="1.25" />
											<path d="M4 8.5a5 5 0 0010 0M9 13.5V16" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
										</svg>
									</button>
									<button type="submit" class="send-btn hidden" id="send" disabled aria-label="Send">
										<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
											<path d="M8 14V3M8 3l-4 4M8 3l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
										</svg>
									</button>
								</div>
							</div>
						</form>

						<div class="inline-commands hidden" id="inline-commands" aria-label="Slash commands">
							<ul class="inline-commands-list" id="inline-commands-list"></ul>
						</div>

						<button type="button" class="commands-hint" id="commands-hint">
							Try Commands <kbd>/</kbd>
						</button>

						<div class="activity-feed" id="activity-feed" aria-label="Recent activity"></div>
					</div>
				</div>

				<!-- Agent chat view -->
				<div class="view view-chat hidden" id="chat-view">
					<header class="chat-header">
						<button type="button" class="back-btn" id="back-to-dashboard" aria-label="Back to dashboard">
							<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
								<path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
							</svg>
						</button>
						<h1 class="chat-title" id="chat-title">New Agent</h1>
						<div class="connection-status status-connecting" id="chat-status">
							<span class="status-dot" aria-hidden="true"></span>
							<span class="status-label">Connecting…</span>
						</div>
					</header>

					<div class="chat-area" id="chat-area">
						<div class="messages" id="messages" aria-live="polite"></div>
					</div>

					<form class="chat-composer" id="chat-composer">
						<div class="chat-composer-inner">
							<textarea
								id="chat-input"
								rows="1"
								placeholder="Ask Pi anything…"
								autocomplete="off"
								spellcheck="true"
							></textarea>
							<div class="chat-composer-actions">
								<button type="button" id="cancel" class="btn btn-stop" disabled aria-label="Stop">
									<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
										<rect x="4" y="4" width="8" height="8" rx="1" fill="currentColor" />
									</svg>
								</button>
								<button type="submit" id="chat-send" class="btn btn-send" disabled aria-label="Send">
									<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
										<path d="M8 14V3M8 3l-4 4M8 3l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
									</svg>
								</button>
							</div>
						</div>
					</form>
				</div>
			</main>
		</div>

		<!-- Commands palette -->
		<div class="commands-overlay hidden" id="commands-overlay" role="dialog" aria-modal="true" aria-label="Commands">
			<div class="commands-panel">
				<input type="text" id="commands-input" placeholder="Type a command…" autocomplete="off" />
				<ul class="commands-list" id="commands-list"></ul>
			</div>
		</div>

		<input type="file" id="file-input" accept="image/*" class="hidden" />

		<script src="/marked.min.js"></script>
		<script src="/app.js"></script>
	</body>
</html>
