<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Pi</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div class="app">
			<aside class="sidebar" id="sidebar">
				<div class="sidebar-header">
					<h2 class="sidebar-title">Chats</h2>
				</div>
				<nav class="session-list" id="session-list" aria-label="Chat sessions"></nav>
				<button type="button" class="new-chat-btn" id="new-chat">
					<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
						<path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
					</svg>
					New chat
				</button>
			</aside>

			<div class="main">
				<header class="top-header">
					<div class="header-left">
						<button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
							<svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
								<path d="M3 4.5h12M3 9h12M3 13.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
							</svg>
						</button>
						<div class="brand">
							<span class="brand-logo" aria-hidden="true">π</span>
							<span class="brand-text">Pi</span>
						</div>
						<span class="project-name" id="project-name" title="">—</span>
					</div>
					<div class="connection-status status-connecting" id="status">
						<span class="status-dot" aria-hidden="true"></span>
						<span class="status-label">Connecting…</span>
					</div>
				</header>

				<div class="chat-area" id="chat-area">
					<section class="welcome" id="welcome">
						<div class="welcome-icon" aria-hidden="true">
							<svg width="48" height="48" viewBox="0 0 48 48" fill="none">
								<rect x="8" y="14" width="32" height="26" rx="6" stroke="currentColor" stroke-width="2" />
								<circle cx="18" cy="26" r="2.5" fill="currentColor" />
								<circle cx="30" cy="26" r="2.5" fill="currentColor" />
								<path d="M20 32h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
								<path d="M24 8v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
								<circle cx="24" cy="6" r="2" fill="currentColor" />
								<path d="M14 14l-3-4M34 14l3-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
							</svg>
						</div>
						<h1 class="welcome-heading">What can I help you build today?</h1>
						<p class="welcome-sub">Ask Pi to explore, edit, or improve your project.</p>
						<button type="button" class="welcome-start-btn" id="welcome-start">Start typing…</button>
						<div class="quick-actions">
							<button type="button" class="quick-action" data-prompt="Explain this codebase — structure, key files, and how things fit together.">
								<span class="quick-action-icon" aria-hidden="true">🔍</span>
								<span class="quick-action-label">Explain codebase</span>
								<span class="quick-action-desc">Understand project structure</span>
							</button>
							<button type="button" class="quick-action" data-prompt="Find and fix a bug in this project. Start by asking me what's broken or scan for likely issues.">
								<span class="quick-action-icon" aria-hidden="true">🐛</span>
								<span class="quick-action-label">Fix a bug</span>
								<span class="quick-action-desc">Track down and resolve issues</span>
							</button>
							<button type="button" class="quick-action" data-prompt="Help me add a new feature. Ask what I want to build, then implement it following existing patterns.">
								<span class="quick-action-icon" aria-hidden="true">✨</span>
								<span class="quick-action-label">Add a feature</span>
								<span class="quick-action-desc">Build something new</span>
							</button>
							<button type="button" class="quick-action" data-prompt="Write tests for the most important parts of this codebase.">
								<span class="quick-action-icon" aria-hidden="true">🧪</span>
								<span class="quick-action-label">Write tests</span>
								<span class="quick-action-desc">Improve test coverage</span>
							</button>
						</div>
					</section>

					<div class="messages" id="messages" aria-live="polite"></div>
				</div>

				<form class="composer" id="composer">
					<div class="composer-inner">
						<div class="composer-attachments" id="attachments" aria-label="Attached images"></div>
						<div class="composer-input-row">
							<textarea
								id="input"
								rows="1"
								placeholder="Ask Pi anything… (Enter to send, Shift+Enter for newline)"
								autocomplete="off"
								spellcheck="true"
							></textarea>
							<div class="composer-actions">
								<button type="button" id="cancel" class="btn btn-stop" disabled aria-label="Stop">
									<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
										<rect x="4" y="4" width="8" height="8" rx="1" fill="currentColor" />
									</svg>
								</button>
								<button type="submit" id="send" class="btn btn-send" disabled aria-label="Send">
									<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
										<path d="M8 14V3M8 3l-4 4M8 3l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
									</svg>
								</button>
							</div>
						</div>
						<div class="composer-footer">
							<div class="composer-footer-left">
								<span class="composer-model-label">Pi</span>
							</div>
							<div class="composer-actions">
								<input type="file" id="image-input" accept="image/*" multiple hidden />
								<button type="button" id="attach-image" class="btn btn-attach" aria-label="Attach image">
									<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
										<rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.25" />
										<circle cx="5.5" cy="6.5" r="1" fill="currentColor" />
										<path d="M2 11l3.5-3.5 2 2L11 6l3 3" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" />
									</svg>
								</button>
							</div>
						</div>
					</div>
				</form>
			</div>
		</div>

		<script src="/marked.min.js"></script>
		<script src="/app.js"></script>
	</body>
</html>
